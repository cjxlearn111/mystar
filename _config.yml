title: mystar
subtitle: Quiet editorial notes on design, systems, and thoughtful making.
description: A minimalist personal blog and knowledge base built with Hexo.
keywords:
  - design
  - blog
  - knowledge-base
author: mystar
language: zh-CN
timezone: Asia/Shanghai
url: https://cjxlearn111.github.io
root: /mystar/
permalink: posts/:title/
permalink_defaults: {}
pretty_urls:
  trailing_index: false
  trailing_html: false

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render: []

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: false
prismjs:
  enable: false

index_generator:
  path: ""
  per_page: 10
  order_by: -date

archive_generator:
  per_page: 20
  yearly: true
  monthly: false

category_generator:
  per_page: 20

tag_generator:
  per_page: 20

theme: mystar

deploy:
  type: git
  repo:
  branch: gh-pages

search:
  path: search.xml
  field: post
  format: html
  limit: 10000
